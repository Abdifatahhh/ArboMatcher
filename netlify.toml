# Eén build voor beide sites (zelfde output; gedrag via hostnaam).
[build]
  command = "npm run build"
  publish = "dist"
  [build.environment]
    NODE_VERSION = "20"
    SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_ANON_KEY,VITE_SUPABASE_URL"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
